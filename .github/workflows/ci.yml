name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    name: build + test (node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node: [20]
        os: [ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (warnings allowed)
        run: npm run lint

      - name: Typecheck shared
        run: npx tsc --noEmit -p packages/shared/tsconfig.json

      - name: Typecheck backend
        run: npx tsc --noEmit -p apps/backend/tsconfig.json

      - name: Typecheck frontend-v2
        run: npx tsc --noEmit -p apps/frontend-v2/tsconfig.json

      - name: Test shared
        run: npm run test:shared

      - name: Test backend
        run: npm run test:backend
        env:
          COMBAT_NO_AUTH: "1"

      - name: Test frontend (vitest unit)
        run: npm run test:frontend:unit
